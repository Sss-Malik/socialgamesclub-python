# k8s-deployment.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-api
  template:
    metadata:
      labels:
        app: casino-api
    spec:
      containers:
      - name: api
        image: us-west1-docker.pkg.dev/brainload-technologies/casino-repo/casino-automation:latest
        command: ["uvicorn","api.main:app","--host","0.0.0.0","--port","8000"]
        envFrom:
        - configMapRef: { name: casino-config }
        - secretRef: { name: casino-secrets }
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer
  selector:
    app: casino-api
  ports:
  - port: 80
    targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-deployment
spec:
  replicas: 5
  selector:
    matchLabels:
      app: casino-celery
  template:
    metadata:
      labels:
        app: casino-celery
    spec:
      containers:
      - name: worker
        image: us-west1-docker.pkg.dev/brainload-technologies/casino-repo/casino-automation:latest
        command:
          ["celery","-A","celery_app.celery_app","worker","--concurrency=8","--loglevel=info"]
        envFrom:
        - configMapRef: { name: casino-config }
        - secretRef: { name: casino-secrets }

