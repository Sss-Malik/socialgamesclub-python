services:
  web:
    build: .
    container_name: casino_web
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: casino_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: casino_worker
    command: >
      celery -A celery_app.celery_app worker
        --beat
        --loglevel=debug
        --concurrency=100
        -Q default,juwa,juwa2,orionstars,gameroom,gamevault,firekirin,ultrapanda,pandamaster,vblink,river,milkyway,goldentreasure
        --hostname=worker.main@%h
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis