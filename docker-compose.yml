services:
  web:
    build: .
    container_name: casino_web
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: casino_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: casino_worker
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=8
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis